dataset:
  json_file: "/home/paul/Projects/histopatho/histo_cell_segmenter_benchmark/pfm_segmentation/dataset_json/rings.json"
  num_classes: 2
  ignore_index: 255

system:
  num_workers: 4
  pin_memory: true
  seed: 42
  device: "cuda:0"

model:
  pfm_name: "hoptimus_0"
  emb_dim: 1536
  finetune_mode:
    type: lora
    rank: 16
    alpha: 16
  transformer_adapter:
    depth: 2
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate: 0.1
    init_values: 1.0e-5
    qk_norm: false
  cnn_adapter:
    width_factor: 1
    block_units: [3, 4, 9]
  pfm_weights_path: "/mnt/storage/models/histo/2D/models--bioptimus--H-optimus-0/snapshots/b145cc1e6c6b30d3251aa8b1f844e6974188a743/pytorch_model.bin"
  num_classes: 2

training:
  batch_size: 2
  epochs: 150
  learning_rate: 0.001
  weight_decay: 0.0001
  use_amp: true
  accumulate_grad_batches: 4
  clip_grad_norm: 5.0
  augmentation:
    RandomResizedCropSize: 518
  optimizer:
    type: "Adam"
    weight_decay: 0.0001
  scheduler:
    type: "cosine"
    warmup_epochs: 2
  loss:
    type: "dice"

validation:
  eval_interval: 1
  batch_size: 4
  augmentation:
    ResizedSize: 518

logging:
  log_dir: "/home/paul/Projects/histopatho/histo_cell_segmenter_benchmark/pfm_segmentation/outputs"
  experiment_name: "rings_hoptimus0_lora"

visualization:
  save_interval: 10
  num_vis_samples: 8
